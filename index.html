<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Mission — Sohaib</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#e8e8e8;min-height:100vh;padding:16px}
.top-header{text-align:center;padding:12px 0 20px}
.top-label{font-size:11px;letter-spacing:3px;color:#7aff5a;text-transform:uppercase;margin-bottom:4px}
.top-date{font-size:36px;font-weight:700;letter-spacing:2px;color:#fff}
.top-date span{color:#7aff5a}
.countdown{font-size:13px;color:#e24b4a;font-weight:500;margin-top:4px}
.countdown.active{color:#7aff5a}
.save-status{font-size:11px;text-align:center;margin-top:4px;color:#444;letter-spacing:1px}
.save-status.saving{color:#EF9F27}
.save-status.saved{color:#1D9E75}
.save-status.error{color:#e24b4a}
.quote-box{background:#1a1a1a;border:0.5px solid #2a2a2a;border-left:2px solid #7aff5a;border-radius:10px;padding:12px 16px;margin-bottom:14px;cursor:pointer}
.quote-text{font-size:13px;color:#ccc;line-height:1.6;font-style:italic}
.quote-tap{font-size:10px;color:#333;margin-top:6px;text-align:right;letter-spacing:1px;text-transform:uppercase}
.overall-bars{background:#1a1a1a;border-radius:12px;padding:14px 16px;margin-bottom:14px;border:0.5px solid #2a2a2a}
.bar-row{margin-bottom:10px}.bar-row:last-child{margin-bottom:0}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:5px}
.bar-label span:last-child{color:#7aff5a;font-weight:500}
.bar-track{height:6px;background:#2a2a2a;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.4s}
.fg{background:#7aff5a}.fp{background:#7F77DD}.ft{background:#1D9E75}
.section-header{font-size:10px;letter-spacing:2px;color:#555;text-transform:uppercase;margin:18px 0 10px;display:flex;align-items:center;gap:8px}
.section-header::after{content:'';flex:1;height:0.5px;background:#2a2a2a}
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:540px){.projects-grid{grid-template-columns:1fr}}
.project-card{border:0.5px solid #2a2a2a;border-radius:12px;overflow:hidden;position:relative;background:#1a1a1a}
.project-card.dov{border-color:#7aff5a}
.proj-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.18;pointer-events:none;border-radius:12px}
.proj-inner{position:relative;z-index:1}
.proj-header{padding:10px 12px 6px;display:flex;align-items:center;gap:8px}
.proj-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:13px;font-weight:500;color:#e8e8e8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-count{font-size:11px;color:#555;margin-top:1px}
.proj-actions{display:flex;gap:4px;align-items:center}
.proj-btn{font-size:10px;padding:2px 6px;border-radius:6px;cursor:pointer;border:0.5px solid #333;background:#1a1a1a;color:#666}
.proj-btn:hover{color:#ccc;border-color:#555}
.proj-prog{padding:0 12px 6px}
.pbt{height:3px;background:#2a2a2a;border-radius:2px;overflow:hidden}
.pbf{height:100%;border-radius:2px;transition:width 0.3s}
.pbp{font-size:10px;color:#555;margin-top:2px}
.task-list{padding:0 6px 4px}
.task-wrap{margin-bottom:3px}
.task-item{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;cursor:grab;border:0.5px solid transparent;user-select:none}
.task-item:hover{background:#222;border-color:#2a2a2a}
.task-item.isd{opacity:0.3}
.task-item.dto{border-color:#7aff5a;background:#1f2a1f}
.cb{width:15px;height:15px;border-radius:4px;border:1.5px solid #3a3a3a;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.cb.chk{background:#7aff5a;border-color:#7aff5a}
.cb.chk::after{content:'';width:4px;height:8px;border:2px solid #111;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;margin:auto}
.task-body{flex:1;min-width:0}
.task-txt{font-size:13px;color:#ccc;background:transparent;border:none;outline:none;font-family:inherit;width:100%;padding:0}
.task-txt.dn{text-decoration:line-through;color:#444}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:2px;flex-wrap:wrap}
.task-date-badge{font-size:10px;padding:1px 6px;border-radius:6px;background:#2a2a2a;color:#888}
.task-date-badge.overdue{background:#3a1a1a;color:#e24b4a}
.task-date-badge.due-soon{background:#2a2014;color:#EF9F27}
.subtask-toggle{font-size:10px;color:#555;cursor:pointer;padding:1px 4px;border-radius:4px}
.subtask-toggle:hover{color:#888}
.drag-handle{font-size:11px;color:#2a2a2a;flex-shrink:0;cursor:grab}
.task-edit-btns{display:flex;gap:3px;flex-shrink:0}
.te-btn{font-size:10px;color:#333;cursor:pointer;padding:2px 4px;border-radius:4px;background:transparent;border:none}
.te-btn:hover{color:#888;background:#222}
.subtasks{padding:0 6px 4px 28px}
.subtask-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;margin-bottom:2px}
.subtask-item:hover{background:#1e1e1e}
.scb{width:13px;height:13px;border-radius:3px;border:1.5px solid #333;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.scb.chk{background:#7aff5a;border-color:#7aff5a}
.scb.chk::after{content:'';width:3px;height:6px;border:1.5px solid #111;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;margin:auto}
.stxt{font-size:12px;color:#999;background:transparent;border:none;outline:none;font-family:inherit;flex:1}
.stxt.dn{text-decoration:line-through;color:#444}
.sdel{font-size:10px;color:#333;cursor:pointer;border:none;background:none;padding:2px}
.sdel:hover{color:#e24b4a}
.add-task-btn{margin:0 6px 8px;width:calc(100% - 12px);padding:5px 8px;background:transparent;border:0.5px dashed #2a2a2a;border-radius:8px;color:#444;font-size:12px;cursor:pointer;text-align:left}
.add-task-btn:hover{border-color:#555;color:#666}
.habit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
@media(max-width:540px){.habit-grid{grid-template-columns:1fr}}
.habit-card{border:0.5px solid #2a2a2a;border-radius:10px;padding:10px 12px;position:relative;overflow:hidden;background:#1a1a1a}
.habit-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0.15;pointer-events:none}
.habit-inner{position:relative;z-index:1}
.habit-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.habit-name{font-size:12px;color:#888;font-weight:500}
.habit-streak{font-size:11px;color:#7aff5a;font-weight:600}
.habit-actions{display:flex;gap:4px}
.hact-btn{font-size:10px;color:#333;cursor:pointer;border:none;background:none;padding:2px}
.hact-btn:hover{color:#888}
.habit-days{display:flex;gap:3px}
.hday{width:24px;height:24px;border-radius:6px;border:0.5px solid #2a2a2a;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#444;background:#161616}
.hday.don{background:#7aff5a;color:#111;border-color:#7aff5a;font-weight:500}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:9px;background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:10px;color:#888;font-size:12px;cursor:pointer;text-align:center}
.btn:hover{border-color:#555;color:#ccc}
.btn-g{border-color:#7aff5a;color:#7aff5a}
.btn-p{border-color:#7F77DD;color:#AFA9EC}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:#1c1c1c;border:0.5px solid #333;border-radius:14px;padding:20px;width:300px;max-width:92vw;margin-bottom:40px}
.modal h3{font-size:15px;font-weight:500;color:#e8e8e8;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{font-size:11px;color:#555;display:block;margin-bottom:4px}
.field input,.field textarea{width:100%;background:#111;border:0.5px solid #333;border-radius:8px;padding:8px 10px;color:#e8e8e8;font-size:13px;outline:none;font-family:inherit}
.field input:focus,.field textarea:focus{border-color:#555}
.field textarea{resize:vertical;min-height:60px}
.p-grid{display:flex;flex-wrap:wrap;gap:6px}
.p-opt{padding:6px 10px;border-radius:8px;border:0.5px solid #2a2a2a;cursor:pointer;font-size:12px;color:#888}
.p-opt:hover{background:#222;color:#ccc}
.p-opt.sel{border-color:#7aff5a;color:#7aff5a}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.img-preview{width:100%;height:80px;object-fit:cover;border-radius:8px;margin-top:6px;display:none}
.img-preview.show{display:block}
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.color-swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.color-swatch.sel{border-color:#fff}

/* upgraded visuals */
.ring-wrap{display:flex;justify-content:center;gap:24px;margin-bottom:14px;flex-wrap:wrap}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.ring-label{font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase}
.proj-icon-img,.habit-icon-img{width:30px;height:30px;border-radius:8px;object-fit:cover;flex-shrink:0}
.proj-icon-wrap,.habit-icon-wrap{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.proj-mini-ring,.habit-mini-ring{flex-shrink:0;filter:drop-shadow(0 0 8px rgba(122,255,90,.12))}
.habit-title-row{display:flex;align-items:center;gap:8px;min-width:0}
.habit-name-wrap{display:flex;flex-direction:column;gap:2px;min-width:0}
.habit-stats{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.habit-chip{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid #2c2c2c;background:#141414;color:#888}
.habit-chip.best{color:#ef9f27;border-color:#5b4420;background:#22180d}
.habit-chip.streak{color:#7aff5a;border-color:#274829;background:#132014}
.habit-ring-num{font-size:9px;font-weight:700}
.habit-icon-label{font-size:10px;color:#444}
.task-link-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.task-link-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 10px;border-radius:999px;
  border:1px solid #2e3440;
  background:linear-gradient(180deg,#1b1f26 0%,#14171c 100%);
  color:#dfe8ff;text-decoration:none;font-size:11px;font-weight:600;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 4px 16px rgba(0,0,0,.25);
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.task-link-pill:hover{
  transform:translateY(-1px);
  border-color:#59627a;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 10px 24px rgba(0,0,0,.35), 0 0 0 1px rgba(127,119,221,.18);
}
.task-link-pill .ico{font-size:12px;opacity:.95}
.task-link-pill .ext{font-size:10px;opacity:.6}
.complete-burst{
  position:fixed;pointer-events:none;z-index:9999;border-radius:50%;
  width:18px;height:18px;opacity:.9;animation:burstOut .9s ease forwards;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.85), rgba(122,255,90,.55) 35%, rgba(122,255,90,0) 70%);
}
.float-win{
  position:fixed;pointer-events:none;z-index:9999;
  color:#7aff5a;font-weight:700;font-size:14px;letter-spacing:.4px;
  text-shadow:0 0 18px rgba(122,255,90,.35);
  animation:floatWin 1.1s ease forwards;
}
.task-item.complete-flash{animation:taskPulse .75s ease}
.project-card.project-win{animation:projectGlow 1.2s ease}
.ring-svg circle,.ring-svg text{transition:all .5s ease}
@keyframes burstOut{
  0%{transform:scale(.3);opacity:1}
  60%{transform:scale(4);opacity:.6}
  100%{transform:scale(6);opacity:0}
}
@keyframes floatWin{
  0%{transform:translateY(0) scale(.9);opacity:0}
  18%{opacity:1}
  100%{transform:translateY(-40px) scale(1.06);opacity:0}
}
@keyframes taskPulse{
  0%{box-shadow:0 0 0 rgba(122,255,90,0);background:rgba(122,255,90,0)}
  30%{box-shadow:0 0 0 1px rgba(122,255,90,.5), 0 0 28px rgba(122,255,90,.14);background:rgba(122,255,90,.07)}
  100%{box-shadow:0 0 0 rgba(122,255,90,0);background:transparent}
}
@keyframes projectGlow{
  0%{box-shadow:0 0 0 rgba(122,255,90,0)}
  35%{box-shadow:0 0 0 1px rgba(122,255,90,.4), 0 0 40px rgba(122,255,90,.18)}
  100%{box-shadow:0 0 0 rgba(122,255,90,0)}
}

</style>
</head>
<body>

<div class="top-header">
<div class="top-label">Your daily mission</div>
<div class="top-date">April <span>7th</span></div>
<div class="countdown" id="countdown"></div>

</div>

<div class="quote-box" onclick="nextQuote()">

</div>


<div class="ring-wrap" id="rings-wrap">

    <svg class="ring-svg" width="80" height="80" viewBox="0 0 80 80">

      <circle id="ring-h" cx="40" cy="40" r="34" fill="none" stroke="#1D9E75" stroke-width="6" stroke-dasharray="0 214" stroke-linecap="round" transform="rotate(-90 40 40)"/>

<div class="overall-bars">

<div class="bar-label"><span>Overall roadmap</span><span id="lbl-o">0%</span></div>
<div class="bar-track"><div class="bar-fill fg" id="bar-o" style="width:0%"></div></div>
</div>
<div class="bar-row">
<div class="bar-label"><span>Tasks completed</span><span id="lbl-t">0/0</span></div>
<div class="bar-track"><div class="bar-fill fp" id="bar-t" style="width:0%"></div></div>
</div>

</div>

<script>
/* ── SUPABASE CONFIG ── */
var SB_URL='https://nrrelxgadtdczdegztdc.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ycmVseGdhZHRkY3pkZWd6dGRjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTA4MDYsImV4cCI6MjA5MDQ2NjgwNn0.VW6jMHuMGofOVOxrCUxvfbYQI7TS5kQlIwWx3VNTEZA';

/* ── CLOUD SAVE ── */
var saveTimer=null;
var SB_HEADERS={
'apikey':SB_KEY,
'Authorization':'Bearer '+SB_KEY,
'Content-Type':'application/json',
'Prefer':'resolution=merge-duplicates,return=minimal'
};

function setStatus(msg,cls){
var el=document.getElementById('save-status');
el.textContent=msg;
el.className='save-status'+(cls?' '+cls:'');
}

async function cloudLoad(){
setStatus('loading...','saving');
try{
var url=SB_URL+'/rest/v1/tracker_state?id=eq.main&select=data';
var res=await fetch(url,{
method:'GET',
headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Accept':'application/json'}
});
if(!res.ok){throw new Error('HTTP '+res.status);}
var rows=await res.json();
if(rows&&rows.length&&rows[0].data&&rows[0].data.projects){
state=rows[0].data;
ensureStateShape();
setStatus('cloud synced ✓','saved');
} else {
loadLocal();
setStatus('ready','saved');
}

function col(ci){return COLORS[(ci||0)%COLORS.length];}
function pct(tasks){if(!tasks||!tasks.length)return 0;return Math.round(tasks.filter(function(t){return t.done;}).length/tasks.length*100);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function dateStatus(d){
if(!d)return '';
var now=new Date();now.setHours(0,0,0,0);
var dt=new Date(d+'T00:00:00');
var diff=Math.ceil((dt-now)/86400000);
if(diff<0)return 'overdue';
if(diff<=3)return 'due-soon';
return '';
}
function fmtDate(d){
if(!d)return '';
return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

function ensureStateShape(){
  state.projects=(state.projects||[]).map(function(p){
    p.iconImg=p.iconImg||'';
    p.tasks=(p.tasks||[]).map(function(t){
      t.notes=t.notes||'';
      t.subtasks=t.subtasks||[];
      t.open=!!t.open;
      t.link=t.link||{label:'',url:''};
      return t;
    });
    return p;
  });
  state.habits=(state.habits||[]).map(function(h){
    h.bg=h.bg||'';
    h.iconImg=h.iconImg||'';
    h.days=h.days||{};
    h.bestStreak=h.bestStreak||0;
    return h;
  });
}
function habitWeekDone(h){
  var wk=weekKeys(), done=0;
  wk.forEach(function(k){ if(h.days[k]) done++; });
  return done;
}
function ringDash(p){
  var circ=2*Math.PI*34;
  var dash=circ*(p/100), gap=circ-dash;
  return dash.toFixed(1)+' '+gap.toFixed(1);
}
function setRing(id, txtId, pct, label){
  var el=document.getElementById(id), tel=document.getElementById(txtId);
  if(el) el.setAttribute('stroke-dasharray', ringDash(pct));
  if(tel) tel.textContent=label;
}


function calcStreak(h){
var today=new Date();today.setHours(0,0,0,0);
var start=new Date(today);
var todayKey='y'+today.getFullYear()+'m'+today.getMonth()+'d'+today.getDate();
if(!h.days[todayKey]) start.setDate(start.getDate()-1);
var streak=0;
for(var i=0;i<365;i++){
  var d=new Date(start);d.setDate(start.getDate()-i);
  var k='y'+d.getFullYear()+'m'+d.getMonth()+'d'+d.getDate();
  if(h.days[k]) streak++;
  else break;
}
return streak;
}
function syncHabitBest(h){
  var s=calcStreak(h);
  h.bestStreak=Math.max(h.bestStreak||0,s);
  return s;
}
function weekKeys(){
var keys=[],today=new Date();today.setHours(0,0,0,0);
var dow=today.getDay();
var mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);keys.push('y'+d.getFullYear()+'m'+d.getMonth()+'d'+d.getDate());}
return keys;
}

function bigCelebrate(x,y,text){
  for(var i=0;i<7;i++){
    var b=document.createElement('div');
    b.className='complete-burst';
    b.style.left=(x-9)+'px';
    b.style.top=(y-9)+'px';
    b.style.animationDelay=(i*0.04)+'s';
    document.body.appendChild(b);
    setTimeout((function(el){return function(){el.remove();};})(b),1000);
  }
  var f=document.createElement('div');
  f.className='float-win';
  f.textContent=text||'Task complete';
  f.style.left=(x-10)+'px';
  f.style.top=(y-10)+'px';
  document.body.appendChild(f);
  setTimeout(function(){f.remove();},1200);
}
function tickTask(pid,tid){
var p=state.projects.find(function(x){return x.id===pid;});
var t=p&&p.tasks.find(function(x){return x.id===tid;});
if(!t)return;
var wasDone=t.done;
t.done=!t.done;
if(t.done && !wasDone){
  var row=document.getElementById('ti-'+tid);
  if(row){
    var r=row.getBoundingClientRect();
    row.classList.add('complete-flash');
    setTimeout(function(){row.classList.remove('complete-flash');},800);
    bigCelebrate(r.left+r.width/2, r.top+r.height/2, 'Task complete');
  }
  if(p.tasks.length && p.tasks.every(function(x){return x.done;})){
    var card=document.getElementById('pc-'+pid);
    if(card){
      card.classList.add('project-win');
      setTimeout(function(){card.classList.remove('project-win');},1300);
    }
  }
}
scheduleSave();render();
}

function editTaskTxt(pid,tid,val){
var p=state.projects.find(function(x){return x.id===pid;});

scheduleSave();
}
function delTask(pid,tid){
var p=state.projects.find(function(x){return x.id===pid;});

scheduleSave();

function delSub(pid,tid,sid){
var p=state.projects.find(function(x){return x.id===pid;});
var t=p&&p.tasks.find(function(x){return x.id===tid;});
if(t&&t.subtasks)t.subtasks=t.subtasks.filter(function(x){return x.id!==sid;});
scheduleSave();render();
}
function addSubtask(pid,tid){
var p=state.projects.find(function(x){return x.id===pid;});
var t=p&&p.tasks.find(function(x){return x.id===tid;});
if(!t)return;
if(!t.subtasks)t.subtasks=[];
var sid='s'+Date.now();
t.subtasks.push({id:sid,text:'New subtask',done:false});
t.open=true;
scheduleSave();render();
}

if(h){
  h.days[key]=!h.days[key];
  syncHabitBest(h);

/* ── PROJECT ACTIONS ── */
function deleteProject(pid){
if(!confirm('Delete this project?'))return;
state.projects=state.projects.filter(function(x){return x.id!==pid;});

/* ── DRAG ── */
function tds(e,pid,tid){dragSrc={pid:pid,tid:tid};e.dataTransfer.effectAllowed='move';setTimeout(function(){var el=document.getElementById('ti-'+tid);if(el)el.classList.add('isd');},0);}
function tde(){document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('isd','dto');});document.querySelectorAll('.project-card').forEach(function(el){el.classList.remove('dov');});dragSrc=null;}
function tdo(e,pid,tid){e.preventDefault();e.stopPropagation();if(!dragSrc||dragSrc.tid===tid)return;document.querySelectorAll('.task-item').forEach(function(el){el.classList.remove('dto');});var el=document.getElementById('ti-'+tid);if(el)el.classList.add('dto');}
function tdp(e,pid,tid){
e.preventDefault();e.stopPropagation();if(!dragSrc||dragSrc.tid===tid)return;
var sp=state.projects.find(function(x){return x.id===dragSrc.pid;});var dp=state.projects.find(function(x){return x.id===pid;});if(!sp||!dp)return;
var si=sp.tasks.findIndex(function(x){return x.id===dragSrc.tid;});var di=dp.tasks.findIndex(function(x){return x.id===tid;});
var task=sp.tasks.splice(si,1)[0];dp.tasks.splice(di,0,task);scheduleSave();render();
}
function cvr(e,pid){e.preventDefault();if(!dragSrc||dragSrc.pid===pid)return;var c=document.getElementById('pc-'+pid);if(c)c.classList.add('dov');}
function cvl(pid){var c=document.getElementById('pc-'+pid);if(c)c.classList.remove('dov');}
function cdp(e,pid){
e.preventDefault();if(!dragSrc||dragSrc.pid===pid)return;
var sp=state.projects.find(function(x){return x.id===dragSrc.pid;});var dp=state.projects.find(function(x){return x.id===pid;});if(!sp||!dp)return;
var si=sp.tasks.findIndex(function(x){return x.id===dragSrc.tid;});var task=sp.tasks.splice(si,1)[0];dp.tasks.push(task);scheduleSave();render();
}

/* ── PRIORITY MODAL ── */
function openPriModal(pid){
editProjId=pid;
var p=state.projects.find(function(x){return x.id===pid;});
var html='';for(var i=1;i<=state.projects.length;i++){html+='<div class="p-opt'+(p.priority===i?' sel':'')+'" onclick="setPri(\''+pid+'\','+i+')">'+i+'</div>';}
document.getElementById('pri-opts').innerHTML=html;
document.getElementById('m-priority').classList.add('open');
}
function setPri(pid,val){
var cur=state.projects.find(function(x){return x.id===pid;});
var swp=state.projects.find(function(x){return x.priority===val&&x.id!==pid;});
if(swp&&cur)swp.priority=cur.priority;if(cur)cur.priority=val;
closeAll();scheduleSave();render();
}

/* ── PROJECT MODAL ── */
function buildColorRow(si){
var html='';COLORS.forEach(function(c,i){html+='<div class="color-swatch'+(i===si?' sel':'')+'" style="background:'+c.accent+'" onclick="selectColor('+i+')"></div>';});
document.getElementById('color-row').innerHTML=html;
}
function selectColor(i){selColor=i;buildColorRow(i);}

function showAddProject(){
editProjId=null;selColor=0;newProjPri=state.projects.length+1;
document.getElementById('m-proj-title').textContent='New project';
document.getElementById('inp-pname').value='';document.getElementById('inp-picon').value='';document.getElementById('inp-pimg').value='';document.getElementById('inp-pbg').value='';
document.getElementById('pimg-preview').classList.remove('show');document.getElementById('bg-preview').classList.remove('show');
buildColorRow(0);buildPriGrid(newProjPri,newProjPri);
document.getElementById('m-proj').classList.add('open');
setTimeout(function(){document.getElementById('inp-pname').focus();},100);
}
function editProject(pid){
editProjId=pid;var p=state.projects.find(function(x){return x.id===pid;});if(!p)return;
selColor=p.ci||0;newProjPri=p.priority;
document.getElementById('m-proj-title').textContent='Edit project';
document.getElementById('inp-pname').value=p.name;document.getElementById('inp-picon').value=p.icon;document.getElementById('inp-pimg').value=p.iconImg||'';document.getElementById('inp-pbg').value=p.bg||'';
var pprev=document.getElementById('pimg-preview');if(p.iconImg){pprev.src=p.iconImg;pprev.classList.add('show');}else{pprev.classList.remove('show');}
var prev=document.getElementById('bg-preview');if(p.bg){prev.src=p.bg;prev.classList.add('show');}else{prev.classList.remove('show');}
buildColorRow(selColor);buildPriGrid(p.priority,state.projects.length);
document.getElementById('m-proj').classList.add('open');
}
function buildPriGrid(sel,max){
var html='';for(var i=1;i<=max;i++){html+='<div class="p-opt'+(i===sel?' sel':'')+'" onclick="pickPri('+i+')">'+i+'</div>';}
document.getElementById('np-pgrid').innerHTML=html;newProjPri=sel;
}
function pickPri(val){newProjPri=val;document.querySelectorAll('#np-pgrid .p-opt').forEach(function(el,i){el.classList.toggle('sel',i+1===val);});}

document.getElementById('inp-pimg').addEventListener('input',function(){
var val=this.value.trim(),prev=document.getElementById('pimg-preview');
if(val){prev.src=val;prev.classList.add('show');}else{prev.classList.remove('show');}
});
document.getElementById('inp-pbg').addEventListener('input',function(){
var val=this.value.trim(),prev=document.getElementById('bg-preview');
if(val){prev.src=val;prev.classList.add('show');}else{prev.classList.remove('show');}
});

function confirmProject(){
var name=document.getElementById('inp-pname').value.trim();if(!name){document.getElementById('inp-pname').focus();return;}
var icon=(document.getElementById('inp-picon').value.trim()||name[0]||'?').toUpperCase();
var iconImg=document.getElementById('inp-pimg').value.trim();
var bg=document.getElementById('inp-pbg').value.trim();
if(editProjId){
var p=state.projects.find(function(x){return x.id===editProjId;});
if(p){var old=p.priority;if(newProjPri!==old){var swp=state.projects.find(function(x){return x.priority===newProjPri&&x.id!==editProjId;});if(swp)swp.priority=old;}
p.name=name;p.icon=icon;p.iconImg=iconImg;p.ci=selColor;p.bg=bg;p.priority=newProjPri;}
} else {
var id='proj_'+Date.now();
state.projects.forEach(function(p){if(p.priority>=newProjPri)p.priority++;});
state.projects.push({id:id,name:name,icon:icon,iconImg:iconImg,ci:selColor,bg:bg,priority:newProjPri,tasks:[]});
}
closeAll();scheduleSave();render();
}

/* ── IMPORT / EXPORT ── */
function doExport(){
var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='daily_mission_sohaib.json';a.click();URL.revokeObjectURL(url);
}
function triggerImport(){document.getElementById('file-inp').click();}
function handleImport(e){
var file=e.target.files[0];if(!file)return;
var r=new FileReader();
r.onload=function(ev){try{state=JSON.parse(ev.target.result);ensureStateShape();scheduleSave();render();}catch(err){alert('Invalid JSON');}};
r.readAsText(file);
}
